name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: 

permissions:
  contents: write

# 全局环境变量，强制要求所有 Action 使用 Node 24 运行
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact_glob: "dist/*.exe"
          - os: macos-latest
            platform: macos
            artifact_glob: "dist/*.dmg"
          - os: ubuntu-latest
            platform: linux
            artifact_glob: "dist/*.AppImage"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 强制使用 Node 24
          
      - name: Install Dependencies
        # 即使没有 lock 文件也能运行
        run: npm install

      - name: Package App
        # 这一步如果失败，请查看这一步下方的详细日志
        run: npm run package

      - name: Debug - List Build Files
        # 即使打包失败，也看看输出了什么，方便排查路径问题
        if: always()
        run: |
          echo "Checking dist folder content..."
          ls -R dist || echo "Dist folder not found"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pushgo-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pushgo-*
          merge-multiple: true
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
